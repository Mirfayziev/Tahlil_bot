{% extends "base.html" %}
{% block title %}Binolar{% endblock %}
{% block content %}
<h2>🏛️ Binolar</h2>
<div class="card">
  <form method="POST" style="display:flex; gap:10px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="text" name="name" placeholder="Bino nomi (masalan: Markaziy Apparat)" required style="flex:1;">
    <input type="text" name="description" placeholder="Tavsif" style="flex:2;">
    <button class="btn" type="submit">Qo'shish</button>
  </form>
</div>
<div class="card">
  <table>
    <thead><tr><th>Nomi</th><th>Tavsif</th><th>Ijrochilar soni</th></tr></thead>
    <tbody>
      {% for b in buildings %}
      <tr style="--i: {{ loop.index }}"><td>{{ b.name }}</td><td>{{ b.description or '-' }}</td><td>{{ b.executors|length }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
