worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Login/API kabi sezgir endpointlarga qo'shimcha himoya qatlami (ilova ichidagi
    # Flask-Limiter'ga qo'shimcha, ikki bosqichli himoya).
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    upstream web_backend {
        server web:8000;
    }

    server {
        listen 80;
        server_name _;

        # Real deploy'da HTTPS'ga majburiy yo'naltirish uchun quyidagini oching:
        # return 301 https://$host$request_uri;

        client_max_body_size 25M;

        location /static/ {
            alias /app/app/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://web_backend;
            include proxy_params.conf;
        }

        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://web_backend;
            include proxy_params.conf;
        }

        location /healthz {
            proxy_pass http://web_backend;
            access_log off;
        }
    }

    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.example;
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ... (yuqoridagi location bloklari shu yerga ham ko'chiriladi)
    # }
}
