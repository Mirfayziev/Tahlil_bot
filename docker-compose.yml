version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-service_platform}
      POSTGRES_USER: ${POSTGRES_USER:-service_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-service_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-service_platform}:${POSTGRES_PASSWORD:-change-this-password}@db:5432/${POSTGRES_DB:-service_platform}
      REDIS_URL: redis://redis:6379/0
      CACHE_TYPE: RedisCache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./app/static:/app/app/static:ro
    depends_on:
      - web

  celery-worker:
    build: .
    restart: unless-stopped
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-service_platform}:${POSTGRES_PASSWORD:-change-this-password}@db:5432/${POSTGRES_DB:-service_platform}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-service_platform}:${POSTGRES_PASSWORD:-change-this-password}@db:5432/${POSTGRES_DB:-service_platform}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  customer_bot:
    build: .
    restart: unless-stopped
    command: python bots/customer_bot.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-service_platform}:${POSTGRES_PASSWORD:-change-this-password}@db:5432/${POSTGRES_DB:-service_platform}
      WEB_API_BASE_URL: http://web:8000/api
    depends_on:
      - web

  executor_bot:
    build: .
    restart: unless-stopped
    command: python bots/executor_bot.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-service_platform}:${POSTGRES_PASSWORD:-change-this-password}@db:5432/${POSTGRES_DB:-service_platform}
      WEB_API_BASE_URL: http://web:8000/api
    depends_on:
      - web

volumes:
  postgres_data:
  uploads_data:
